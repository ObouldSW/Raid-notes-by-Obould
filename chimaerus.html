<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chimaerus — Raid Notes</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0b0a10">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#0b0a10; color:#f0ead9; font-family:'Poppins',sans-serif; -webkit-font-smoothing:antialiased; }
  .topbar{
    position: sticky; top:0; z-index: 10;
    display:flex; align-items:center; gap:12px;
    padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top));
    background: rgba(11,10,16,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(212,175,106,.15);
  }
  .back{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(212,175,106,.08); border:1px solid rgba(212,175,106,.25);
    color:#d4af6a; text-decoration:none;
  }
  .back svg{ width:16px; height:16px; }
  .topbar-title{ font-size: 14px; font-weight: 700; color:#f0ead9; }
  .topbar-sub{ font-size: 10.5px; color:#a89a80; }

  .jumpnav{
    display:flex; gap:8px; padding: 12px 16px; overflow-x:auto;
    border-bottom: 1px solid rgba(212,175,106,.1);
  }
  .jumpnav a{
    flex-shrink:0; font-size: 11.5px; font-weight:600; color:#a89a80;
    padding: 6px 12px; border-radius: 20px; border:1px solid rgba(212,175,106,.2);
    text-decoration:none; scroll-snap-align:start;
  }
  .jumpnav a:active{ background: rgba(212,175,106,.12); color:#d4af6a; }

  .cards{ max-width: 640px; margin: 0 auto; padding: 16px 12px 48px; }
  .cards img{ width:100%; display:block; border-radius: 20px; margin-bottom: 18px; scroll-margin-top: 120px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div>
      <div class="topbar-title">Chimaerus the Undreamt God</div>
      <div class="topbar-sub">VS/DR/MQD · Heroic</div>
    </div>
  </div>
  <div class="jumpnav">
    <a href="#c1">Overview</a>
    <a href="#c2">Phase 1</a>
    <a href="#c3">Phase 2</a>
    <a href="#c4">Tank</a>
  </div>
  <div class="cards">
    <img id="c1" src="../images/chimaerus-1-overview.png" alt="Overview">
    <img id="c2" src="../images/chimaerus-2-phase1.png" alt="Phase 1">
    <img id="c3" src="../images/chimaerus-3-phase2.png" alt="Phase 2">
    <img id="c4" src="../images/chimaerus-4-tank.png" alt="Tank guide">
  </div>
</body>
</html>
